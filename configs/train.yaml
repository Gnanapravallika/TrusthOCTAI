# Training loop configurations for TrustOCT

optimizer: "adamw"            # Options: adamw, sgd
learning_rate: 0.0001
weight_decay: 0.0005

scheduler: "cosine"           # Options: cosine, step, none
cosine_T_max: 30

epochs: 30
device: "cuda"                # Options: cuda, cpu

loss: "edl_loss"              # Options: edl_loss, cross_entropy
edl:
  annealing_epochs: 10
  kl_weight: 1.0

checkpoint:
  save_dir: "weights/"
  save_freq: 5
  monitor_metric: "val_loss"
  mode: "min"
  patience: 5

logging:
  tensorboard: true
  csv: true
  log_dir: "logs/"
