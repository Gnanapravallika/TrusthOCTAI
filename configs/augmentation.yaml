# Image Enhancement and Augmentations for TrustOCT

preprocessing:
  resize: [224, 224]
  clahe:
    clip_limit: 2.0
    tile_grid_size: [8, 8]
    enabled: true
  bilateral_filter:
    d: 9
    sigma_color: 75
    sigma_space: 75
    enabled: true

augmentations:
  random_rotate:
    limit: 15
    p: 0.5
  horizontal_flip:
    p: 0.5
  random_brightness_contrast:
    brightness_limit: 0.1
    contrast_limit: 0.1
    p: 0.5
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
